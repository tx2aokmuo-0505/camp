name: Suwa Camp Patrol

on:
  schedule:
    # 15分おきに自動実行 (UTC時間)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 手動で実行するボタンを出す設定

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 徳ポイント(txtファイル)を書き換えて保存するために必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_camp.py

      - name: Commit and Push Toku point
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_messages.txt
          # 変更（徳の加算）があった場合のみGitHubに保存する
          if ! git diff --cached --quiet; then
            git commit -m "Update Suwa Toku point [skip ci]"
            git push
          fi
